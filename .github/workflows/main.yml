name: Frontend CI with Node, ESLint, Prettier, Typecheck and Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier Check
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test:ci
